<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" href="../Css/style.css">
    <title>Tetris</title>
</head>

<body>
    <canvas id="tetriminoGuardadoCanvas" width="100" height="100"></canvas>
    <canvas id="colaTetriminosCanvas" width="100" height="300"></canvas>

    <audio id="tetrisSound" loop hidden>
        <source src="../Sounds/SoundTetrosGameBoy.mp3" type="audio/mpeg">
    </audio>
    <h4 id="hold">HOLD</h4>
    <h4 id="next">NEXT</h4>

    <table id="teclaIndicacionesTable">
        <tr>
            <td>
                <p>⬆️: Girar</p>
            </td>
        </tr>
        <tr>
            <td>
                <p>⬅️➡️: Mover</p>
            </td>
        </tr>
        <tr>
            <td>
                <p>⬇️: Acelerar Descenso</p>
            </td>
        </tr>
        <tr>
            <td>
                <p>S Key: Guardar</p>
            </td>
        </tr>
        <tr>
            <td>
                <p>Space key: Caída Libre</p>
            </td>
        </tr>
    </table>

    <div id="playButtonContainer">
        <button id="playButton">Play</button>
    </div>

    <script src="../Js/Canvas.js"></script>
    <script src="../Js/Tablero.js"></script>
    <script src="../Js/Tetrimino.js"></script>
    <script src="../Js/Script.js"></script>

    <script>
        var playButton = document.getElementById('playButton');
        var sound = document.getElementById('tetrisSound');
        var spacePressed = false;

        playButton.addEventListener('click', function () {
            if (sound.paused) {
                sound.play();
                playButton.textContent = 'Pause';
            } else {
                sound.pause();
                playButton.textContent = 'Play';
            }
        });

        playButton.addEventListener('keydown', function (event) {
            if (event.keyCode === 32) {
                event.preventDefault();
                spacePressed = true;
            }
        });

        playButton.addEventListener('keyup', function (event) {
            if (event.keyCode === 32) {
                spacePressed = false;
            }
        });
    </script>
</body>

</html>
